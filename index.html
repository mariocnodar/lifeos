<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Life OS" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Life OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f5f7;
      --bg2: #ffffff;
      --bg3: #ebebed;
      --border: rgba(0,0,0,0.08);
      --text: #0a0a0a;
      --text2: #666;
      --text3: #aaa;
      --green: #1a9e6e;
      --green-bg: rgba(26,158,110,0.1);
      --blue: #2563eb;
      --amber: #d97706;
      --amber-bg: rgba(217,119,6,0.1);
      --red: #dc2626;
      --red-bg: rgba(220,38,38,0.1);
      --coral: #c2410c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 24px); }
    .app { max-width: 430px; margin: 0 auto; padding: 0 16px; }
    .header { padding: 56px 0 24px; display: flex; justify-content: space-between; align-items: flex-end; }
    .header h1 { font-size: 30px; font-weight: 500; letter-spacing: -0.5px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .fecha { font-size: 12px; color: var(--text2); }
    .section { margin-bottom: 20px; }
    .section-label { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; padding-left: 2px; }
    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; }
    .habit-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .habit-row:last-child { border-bottom: none; }
    .check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--bg3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .check.done { background: var(--green); border-color: var(--green); }
    .check.done::after { content: ''; display: block; width: 8px; height: 5px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); }
    .habit-name { font-size: 14px; color: var(--text); flex: 1; }
    .habit-name.done { color: var(--text3); text-decoration: line-through; }
    .habit-tag { font-size: 10px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 10px; }
    .task-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .task-row:last-child { border-bottom: none; }
    .task-box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--bg3); flex-shrink: 0; cursor: pointer; transition: all 0.2s; }
    .task-box.completing { background: var(--green); border-color: var(--green); opacity: 0.5; }
    .task-row.done-anim { opacity: 0; transition: opacity 0.3s; }
    .task-name { font-size: 14px; color: var(--text); flex: 1; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 500; }
    .badge-red { background: var(--red-bg); color: var(--red); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; }
    .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .metric-value { font-size: 26px; font-weight: 300; letter-spacing: -1px; }
    .metric-unit { font-size: 13px; color: var(--text2); font-weight: 400; }
    .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .cals-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-top: 10px; }
    .cals-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .cals-label { font-size: 11px; color: var(--text2); }
    .cals-values { display: flex; gap: 16px; }
    .cal-item { text-align: right; }
    .cal-num { font-size: 20px; font-weight: 300; letter-spacing: -0.5px; }
    .cal-sub { font-size: 10px; color: var(--text3); }
    .cal-bar-wrap { margin-top: 6px; }
    .cal-bar-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-bottom: 4px; }
    .cal-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .cal-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.4s; }
    .weekly-inner { padding: 14px 16px; }
    .weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .day-label-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 8px; }
    .day-lbl { font-size: 10px; color: var(--text3); text-align: center; }
    .day-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .day-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text2); }
    .day-num.today { border: 1.5px solid var(--blue); color: var(--blue); font-weight: 500; }
    .pip { width: 28px; height: 5px; border-radius: 3px; background: var(--bg3); }
    .pip.done { background: var(--green); }
    .day-bar-track { width: 28px; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .day-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.4s; }
    .day-pct { font-size: 9px; color: var(--text3); margin-top: 2px; }
    .goal-row { padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .goal-row:last-child { border-bottom: none; }
    .goal-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .goal-name { font-size: 13px; color: var(--text); flex: 1; padding-right: 8px; }
    .goal-dates { font-size: 10px; color: var(--text3); white-space: nowrap; }
    .goal-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-bottom: 4px; }
    .goal-fill { height: 100%; border-radius: 2px; }
    .goal-pct { font-size: 10px; color: var(--text3); }
    .state-loading { padding: 16px; font-size: 13px; color: var(--text3); }
    .state-empty { padding: 16px; font-size: 13px; color: var(--text3); text-align: center; }
    .state-error { padding: 12px 16px; font-size: 12px; color: var(--red); }
    .fab { position: fixed; bottom: calc(22px + env(safe-area-inset-bottom)); right: 22px; width: 48px; height: 48px; border-radius: 50%; background: #1a1a1a; border: none; color: #fff; font-size: 19px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Life OS</h1>
    <div class="header-right">
      <div class="fecha" id="fecha"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Hábitos de hoy</div>
    <div class="card" id="habitos"><div class="state-loading">Cargando...</div></div>
  </div>

  <div class="section">
    <div class="section-label">Tareas pendientes</div>
    <div class="card" id="tareas"><div class="state-loading">Cargando...</div></div>
  </div>

  <div class="section">
    <div class="section-label">Finanzas y calorías</div>
    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">Dinero disponible</div>
        <div><span class="metric-value" id="disponible-val">—</span><span class="metric-unit"> €</span></div>
        <div class="metric-sub" id="disponible-sub"> </div>
      </div>
      <div class="metric">
        <div class="metric-label">Gastos variables</div>
        <div><span class="metric-value" id="gastos-val">—</span><span class="metric-unit"> €</span></div>
        <div class="metric-sub" id="gastos-sub"> </div>
      </div>
    </div>
    <div class="cals-card">
      <div class="cals-row">
        <span class="cals-label">Calorías hoy</span>
        <div class="cals-values">
          <div class="cal-item">
            <div class="cal-num" id="cals-in">—</div>
            <div class="cal-sub">ingeridas</div>
          </div>
          <div class="cal-item">
            <div class="cal-num" id="cals-objetivo">—</div>
            <div class="cal-sub">objetivo</div>
          </div>
        </div>
      </div>
      <div class="cal-bar-wrap">
        <div class="cal-bar-label">
          <span>0</span>
          <span id="cal-bar-objetivo-label">1750</span>
        </div>
        <div class="cal-bar"><div class="cal-fill" id="cal-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Semana — hábitos diarios</span>
      <button onclick="crearSemana()" id="crear-semana-btn" style="font-size:10px;color:var(--text3);background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;">+ Crear semana</button>
    </div>
    <div class="card">
      <div class="weekly-inner">
        <div class="day-label-row">
          <div class="day-lbl">L</div><div class="day-lbl">M</div><div class="day-lbl">X</div>
          <div class="day-lbl">J</div><div class="day-lbl">V</div><div class="day-lbl">S</div>
          <div class="day-lbl">D</div>
        </div>
        <div class="weekly-grid" id="weekly"><div class="state-loading" style="grid-column:1/-1">Cargando...</div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Goals activos</div>
    <div class="card" id="goals"><div class="state-loading">Cargando...</div></div>
  </div>
</div>

<button class="fab" id="fab" onclick="loadAll()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"></polyline>
    <polyline points="1 20 1 14 7 14"></polyline>
    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
  </svg>
</button>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const PROXY = '/api/notion';  // mismo dominio, no necesita URL absoluta
const SUELDO = 1600;
const CAT_AHORRO = 'Ahorro / Inversión ';

const DB = {
  dailyRoutine: '288f99ee-6960-8291-87bc-018e7bc45478',
  weeklyHabits: 'a79f99ee-6960-83dc-bbef-8126e748db3b',
  tareas:       '34ff99ee-6960-8042-b1f3-ed74fcb93597',
  movimientos:  '78b3ed9a-16db-4a6f-bbf5-1b1fb0dd3d8e',
  nutricion:    '34ef99ee-6960-800a-8c57-e61ac53a587a',
  deporte:      '34ef99ee-6960-8034-9c00-d2a969fae248',
  goals:        '102f99ee-6960-82ce-b4b9-016e0c04f057'
};

const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ─── UTILS ────────────────────────────────────────────────────────────────────
function setFecha() {
  const d = new Date();
  document.getElementById('fecha').textContent = `${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
}

function getPeriodo25() {
  const hoy = new Date();
  const dia = hoy.getDate();
  const pad = n => String(n).padStart(2, '0');

  let iY, iM, iD, fY, fM, fD;
  if (dia >= 25) {
    iY = hoy.getFullYear(); iM = hoy.getMonth() + 1; iD = 25;
    const finDate = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 24);
    fY = finDate.getFullYear(); fM = finDate.getMonth() + 1; fD = 24;
  } else {
    const inicioDate = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 25);
    iY = inicioDate.getFullYear(); iM = inicioDate.getMonth() + 1; iD = 25;
    fY = hoy.getFullYear(); fM = hoy.getMonth() + 1; fD = 24;
  }
  return {
    inicio: `${iY}-${pad(iM)}-${pad(iD)}`,
    fin:    `${fY}-${pad(fM)}-${pad(fD)}`
  };
}

async function query(dbId, filter, sorts) {
  try {
    const body = {};
    if (filter) body.filter = filter;
    if (sorts)  body.sorts  = sorts;
    const r = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        endpoint: `databases/${dbId}/query`,
        body
      })
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// ─── HÁBITOS ──────────────────────────────────────────────────────────────────
async function getWeeklyHoyId() {
  const hoy = new Date().toISOString().split('T')[0];
  const data = await query(DB.weeklyHabits, {
    property: 'Date', date: { equals: hoy }
  });
  if (data?.results?.length) return data.results[0].id;
  return null;
}

async function toggleHabito(pageId, habitName, checkEl, done) {
  const nuevoEstado = !done;
  checkEl.classList.toggle('done', nuevoEstado);
  const nameEl = checkEl.nextElementSibling;
  nameEl.classList.toggle('done', nuevoEstado);
  checkEl.dataset.done = nuevoEstado;

  try {
    // Actualiza Daily Routine
    await fetch(PROXY, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pageId,
        properties: { Checkbox: { checkbox: nuevoEstado } }
      })
    });

    // Actualiza Weekly Habits si el hábito tiene columna equivalente
    const weeklyId = await getWeeklyHoyId();
    if (weeklyId) {
      await fetch(PROXY, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          pageId: weeklyId,
          properties: { [habitName]: { checkbox: nuevoEstado } }
        })
      });
    }
  } catch(e) {
    // Revertir si falla
    checkEl.classList.toggle('done', done);
    nameEl.classList.toggle('done', done);
    checkEl.dataset.done = done;
  }
}

async function loadHabitos() {
  const el = document.getElementById('habitos');
  const data = await query(DB.dailyRoutine);
  if (!data?.results) { el.innerHTML = '<div class="state-error">Error al cargar</div>'; return; }
  const items = data.results.filter(p => p.properties?.Name?.title?.length);
  if (!items.length) { el.innerHTML = '<div class="state-empty">Sin hábitos configurados</div>'; return; }
  const franjas = { 'Morning 🌤️': 'Mañana', 'Afternoon 🌅': 'Mediodía', 'Evening 🌖': 'Noche' };
  el.innerHTML = items.map(p => {
    const name = p.properties.Name.title[0].plain_text;
    const done = p.properties.Checkbox?.checkbox || false;
    const tag  = franjas[p.properties.Routine?.select?.name] || '';
    return `<div class="habit-row"><div class="check ${done?'done':''}" data-done="${done}" onclick="toggleHabito('${p.id}', '${name.replace(/'/g, "\'")}', this, this.dataset.done === 'true')"></div><span class="habit-name ${done?'done':''}">${name}</span>${tag?`<span class="habit-tag">${tag}</span>`:''}</div>`;
  }).join('');
}

// ─── TAREAS ───────────────────────────────────────────────────────────────────
async function completarTarea(pageId, rowEl) {
  const box = rowEl.querySelector('.task-box');
  box.classList.add('completing');
  try {
    const r = await fetch(PROXY, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pageId,
        properties: { Completada: { checkbox: true } }
      })
    });
    if (r.ok) {
      rowEl.classList.add('done-anim');
      setTimeout(() => rowEl.remove(), 300);
      const el = document.getElementById('tareas');
      if (!el.querySelector('.task-row')) {
        el.innerHTML = '<div class="state-empty">Sin tareas pendientes ✓</div>';
      }
    } else {
      box.classList.remove('completing');
    }
  } catch(e) {
    box.classList.remove('completing');
  }
}

async function loadTareas() {
  const el = document.getElementById('tareas');
  const data = await query(
    DB.tareas,
    { property: 'Completada', checkbox: { equals: false } },
    [{ property: 'Prioridad', direction: 'ascending' }]
  );
  if (!data?.results) { el.innerHTML = '<div class="state-error">Error al cargar</div>'; return; }
  if (!data.results.length) { el.innerHTML = '<div class="state-empty">Sin tareas pendientes ✓</div>'; return; }
  const pm = { '🔴 Urgente': ['badge-red','🔴'], '🟡 Normal': ['badge-amber','🟡'], '🟢 Puede esperar': ['badge-green','🟢'] };
  el.innerHTML = data.results.map(p => {
    const name   = p.properties.Tarea?.title?.[0]?.plain_text || '—';
    const prio   = p.properties.Prioridad?.select?.name || '';
    const [cls, emoji] = pm[prio] || ['badge-green',''];
    return `<div class="task-row" data-id="${p.id}"><div class="task-box" onclick="completarTarea('${p.id}', this.closest('.task-row'))"></div><span class="task-name">${name}</span>${prio?`<span class="badge ${cls}">${emoji}</span>`:''}</div>`;
  }).join('');
}

// ─── FINANZAS + CALORÍAS ──────────────────────────────────────────────────────
async function loadMetricas() {
  const hoy = new Date().toISOString().split('T')[0];
  const { inicio, fin } = getPeriodo25();

  const movData = await query(DB.movimientos, {
    and: [
      { property: 'Fecha', date: { on_or_after: inicio } },
      { property: 'Fecha', date: { on_or_before: fin } }
    ]
  });

  let ingresos = 0, gastosTotales = 0, gastosVariables = 0, gastosCount = 0, ahorro = 0;
  if (movData?.results) {
    movData.results.forEach(p => {
      const props    = p.properties || {};
      const tipo     = props.Tipo?.select?.name || '';
      const fijo     = props.Fijo?.checkbox === true;
      const cantidad = props.Cantidad?.number || 0;
      const cat      = props['Categoría']?.select?.name || '';
      if (tipo === 'Ingreso') {
        ingresos += cantidad;
      }
      if (tipo === 'Gasto') {
        if (cat === CAT_AHORRO) {
          ahorro += cantidad;
        } else {
          gastosTotales += cantidad;
          if (!fijo) {
            gastosVariables += cantidad;
            gastosCount++;
          }
        }
      }
    });
  }

  const disponible = ingresos - gastosTotales - ahorro;
  document.getElementById('disponible-val').textContent = Math.round(disponible);
  document.getElementById('disponible-sub').textContent = `de ${Math.round(ingresos)}€ ingresos`;
  document.getElementById('gastos-val').textContent     = Math.round(gastosVariables);
  document.getElementById('gastos-sub').textContent     = `${gastosCount} movimiento${gastosCount !== 1 ? 's' : ''}`;

  const nutData = await query(DB.nutricion, {
    property: 'Fecha', date: { equals: hoy }
  });
  let calsIn = 0;
  if (nutData?.results) {
    nutData.results.forEach(p => {
      calsIn += p.properties['Calorías']?.number || 0;
    });
  }

  const depData = await query(DB.deporte, {
    property: 'Fecha', date: { equals: hoy }
  });
  let calsOut = 0;
  if (depData?.results) {
    depData.results.forEach(p => {
      calsOut += p.properties['Calorías quemadas']?.number || 0;
    });
  }

  const objetivo = 1750 + calsOut;
  document.getElementById('cals-in').textContent         = calsIn > 0 ? Math.round(calsIn) : '—';
  document.getElementById('cals-objetivo').textContent   = Math.round(objetivo);
  document.getElementById('cal-bar-objetivo-label').textContent = Math.round(objetivo);

  const pct = calsIn > 0 ? Math.min(110, Math.round((calsIn / objetivo) * 100)) : 0;
  const bar = document.getElementById('cal-bar');
  bar.style.width      = pct + '%';
  bar.style.background = pct > 100 ? 'var(--red)' : 'var(--green)';
}

// ─── WEEKLY ───────────────────────────────────────────────────────────────────
const WEEKLY_HABITS = ['Meditar','Leer','Deporte','Registrar comida','Mirar inversiones','Dejar el teléfono','1 hora sin teléfono'];

async function loadWeekly() {
  const el = document.getElementById('weekly');
  const data = await query(DB.weeklyHabits, null, [{ property: 'Date', direction: 'ascending' }]);
  if (!data?.results?.length) { el.innerHTML = '<div class="state-empty">Sin datos</div>'; return; }
  const hoyDia   = new Date().getDay();
  const todayIdx = hoyDia === 0 ? 6 : hoyDia - 1;
  el.innerHTML = data.results.slice(0,7).map((p, i) => {
    const dateStr  = p.properties['Date']?.date?.start;
    const dayNum   = dateStr ? new Date(dateStr + 'T12:00:00').getDate() : i + 1;
    const completados = WEEKLY_HABITS.filter(h => p.properties[h]?.checkbox).length;
    const total    = WEEKLY_HABITS.length;
    const pct      = Math.round((completados / total) * 100);
    const color    = pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--blue)' : 'var(--amber)';
    return `<div class="day-cell">
      <div class="day-num ${i===todayIdx?'today':''}">${dayNum}</div>
      <div class="day-bar-track"><div class="day-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="day-pct">${completados}/${total}</div>
    </div>`;
  }).join('');
}

// ─── GOALS ────────────────────────────────────────────────────────────────────
async function loadGoals() {
  const el = document.getElementById('goals');
  const data = await query(DB.goals, {
    property: 'Achieved?', checkbox: { equals: false }
  });
  if (!data?.results) { el.innerHTML = '<div class="state-error">Error al cargar</div>'; return; }
  if (!data.results.length) { el.innerHTML = '<div class="state-empty">Sin goals activos</div>'; return; }

  // Cargar todos los movimientos históricos para calcular ahorro acumulado
  const todosMovData = await query(DB.movimientos);
  const movimientos = todosMovData?.results || [];

  const colors = ['var(--green)', 'var(--blue)', 'var(--coral)'];
  const hoy    = new Date();

  el.innerHTML = await Promise.all(data.results.map(async (p, i) => {
    const name        = p.properties['Vision Goals']?.title?.[0]?.plain_text || 'Goal';
    const targetDate  = p.properties['Target Date']?.date?.start;
    const createdAt   = p.created_time;
    const objetivoEur = p.properties['Objetivo €']?.number || null;

    let progreso = 2, diasRestantes = '—', fechaInicioStr = '—', fechaFinStr = '—';
    let euroHTML = '';

    if (targetDate && createdAt) {
      const inicio      = new Date(createdAt);
      const fin         = new Date(targetDate);
      const totalDias   = Math.max(1, Math.round((fin - inicio) / 86400000));
      const diasPasados = Math.max(0, Math.round((hoy - inicio) / 86400000));
      const diff        = Math.ceil((fin - hoy) / 86400000);

      diasRestantes = diff > 0 ? `${diff}d restantes` : 'Vencido';
      progreso      = Math.max(2, Math.min(98, Math.round((diasPasados / totalDias) * 100)));

      const fmt = d => `${d.getDate()} ${MESES[d.getMonth()].slice(0,3)}`;
      fechaInicioStr = fmt(inicio);
      fechaFinStr    = fmt(fin);

      // Si tiene objetivo en euros, calcular progreso económico
      if (objetivoEur) {
        const inicioStr = inicio.toISOString().split('T')[0];
        const ahorroAcumulado = movimientos
          .filter(m => {
            const cat = m.properties['Categoría']?.select?.name || '';
            const fecha = m.properties['Fecha']?.date?.start || '';
            return cat === CAT_AHORRO && fecha >= inicioStr;
          })
          .reduce((s, m) => s + (m.properties['Cantidad']?.number || 0), 0);

        const pctEur = Math.min(100, Math.round((ahorroAcumulado / objetivoEur) * 100));
        euroHTML = `<div class="goal-pct" style="margin-top:3px;color:var(--green)">
          ${Math.round(ahorroAcumulado).toLocaleString('es-ES')}€ / ${objetivoEur.toLocaleString('es-ES')}€ · ${pctEur}%
        </div>`;
        // Sobreescribir progreso de barra con el económico
        progreso = Math.max(2, Math.min(98, pctEur));
      }
    }

    return `
      <div class="goal-row">
        <div class="goal-top">
          <span class="goal-name">${name}</span>
          <span class="goal-dates">${diasRestantes}</span>
        </div>
        <div class="goal-bar">
          <div class="goal-fill" style="width:${progreso}%;background:${colors[i%colors.length]}"></div>
        </div>
        <div class="goal-pct">${fechaInicioStr} → ${fechaFinStr} · ${progreso}%</div>
        ${euroHTML}
      </div>`;
  })).then(rows => rows.join(''));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
const WEEKLY_DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

function getLunesSemana() {
  const hoy = new Date();
  const dia = hoy.getDay();
  const diffLunes = dia === 0 ? -6 : 1 - dia;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diffLunes);
  return lunes;
}

async function crearSemana() {
  const btn = document.getElementById('crear-semana-btn');
  btn.textContent = 'Creando...';
  btn.disabled = true;

  const lunes = getLunesSemana();
  const pad = n => String(n).padStart(2, '0');

  // Comprobar si ya existen filas para esta semana
  const lunesStr = `${lunes.getFullYear()}-${pad(lunes.getMonth()+1)}-${pad(lunes.getDate())}`;
  const domingo = new Date(lunes); domingo.setDate(lunes.getDate() + 6);
  const domingoStr = `${domingo.getFullYear()}-${pad(domingo.getMonth()+1)}-${pad(domingo.getDate())}`;

  const existing = await query(DB.weeklyHabits, {
    and: [
      { property: 'Date', date: { on_or_after: lunesStr } },
      { property: 'Date', date: { on_or_before: domingoStr } }
    ]
  });

  if (existing?.results?.length >= 7) {
    btn.textContent = 'Ya existe';
    setTimeout(() => { btn.textContent = '+ Crear semana'; btn.disabled = false; }, 2000);
    return;
  }

  // Crear las filas que faltan
  const existingDates = new Set((existing?.results || []).map(p => p.properties['Date']?.date?.start));
  let creados = 0;

  for (let i = 0; i < 7; i++) {
    const fecha = new Date(lunes);
    fecha.setDate(lunes.getDate() + i);
    const fechaStr = `${fecha.getFullYear()}-${pad(fecha.getMonth()+1)}-${pad(fecha.getDate())}`;

    if (existingDates.has(fechaStr)) continue;

    await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        endpoint: 'pages',
        body: {
          parent: { database_id: DB.weeklyHabits },
          properties: {
            'Weekday ': { title: [{ text: { content: WEEKLY_DIAS[i] } }] },
            'Date': { date: { start: fechaStr } },
            'Meditar': { checkbox: false },
            'Leer': { checkbox: false },
            'Deporte': { checkbox: false },
            'Registrar comida': { checkbox: false },
            'Mirar inversiones': { checkbox: false },
            'Dejar el teléfono': { checkbox: false },
            '1 hora sin teléfono': { checkbox: false }
          }
        }
      })
    });
    creados++;
  }

  btn.textContent = creados > 0 ? `✓ ${creados} días creados` : 'Ya existe';
  setTimeout(() => { btn.textContent = '+ Crear semana'; btn.disabled = false; }, 2000);
  loadWeekly();
}

async function loadAll() {
  setFecha();
  loadHabitos();
  loadTareas();
  loadMetricas();
  loadWeekly();
  loadGoals();
}

loadAll();
